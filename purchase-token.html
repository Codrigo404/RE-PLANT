<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compra de Tokens</title>
    <link rel="stylesheet" href="./css/purchase-token.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-container">
        <header class="hud-header">
            <div class="header-line"></div>
            <h1 class="protocol-title">Purchase_Tokens</h1>
        </header>

        <section id="step-1" class="step-box active">
            <h2 class="section-title">COMPRA_DE_TOKENS</h2>
            <!--Numero de TOkens-->
            <div class="form-group">
                <label>QUANTIDADE_DE_TOKENS</label>
                <input type="number" id="Token" placeholder="Ex: 299" maxlength="10">
            </div>
            <span class="token_value">Valor token: R$1,99</span>
            <!-- NOVOS CAMPOS: VALOR TOTAL DE TOKENS -->
            <div class="form-group">
                <label>VALOR_TOTAL</label>
                <input type="text" id="valor_Token" placeholder="R$ 100,00">
            </div>
          
            <button class="btn-neon" onclick="gerarProtocoloEmpresa()">COMPRAR_TOKENS</button>
            <button class="btn-neon" style="border-color: var(--cyber-blue); color: var(--cyber-blue);" onclick="window.location.href='index.html'">VOLTAR</button>
        </section>
    
    </div>
</body>
</html>
