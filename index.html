<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REPLANT | Initializing Protocol</title>
    <link rel="stylesheet" href="./css/index.css">
    <!-- Fontes Futuristas -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

  
</head>
<body>

    <div class="main-container">
        
        <!-- TELA DE LOADING -->
        <div id="loading-screen">
            <img src="./image/RE-PLANT12-removebg-preview.png" class="logo-loading" alt="REPLANT">
            
            <!-- Mudinhas que vão "nascer" em sequência -->
            <div class="seedlings-container" id="seedling-box">
                <span class="seedling">🌱</span>
                <span class="seedling">🌱</span>
                <span class="seedling">🌱</span>
                <span class="seedling">🌱</span>
                <span class="seedling">🌱</span>
                <span class="seedling">🌱</span>
            </div>

            <div class="load-bar">
                <div class="load-fill" id="progress-fill"></div>
            </div>
            <p id="status-text" class="load-text">INITIALIZING_PROTOCOL...</p>
        </div>

       
        <section id="select-screen">
            <h2 class="hud-title">SELECT_ACCESS_LEVEL</h2>
            <div class="choice-container">
                <button class="choice-card blue-border" onclick="window.location.href='./cad-empresa.html'">
                    <h3 style="color: var(--cyber-blue)">CORPORATIVO</h3>
                    <p>CREDITOS DE CARBONO PRA EMPRESAS</p>
                </button>

                <button class="choice-card blue-border" onclick="window.location.href='./cad-empresa.html'">
                    <h3 style="color: var(--cyber-blue)">SHOP</h3>
                    <p>AJUDE A SALVAR NOSSO PLANETA!</p>
                </button>

                <button class="choice-card green-border" onclick="window.location.href='./semeador.html'">
    <h3 style="color: var(--neon-green)">SEMEADOR PLANTE PARA GANHAR DINHEIRO!</h3>
    <p>PLANTIO E CUIDADO</p>
    <span>ACESSAR_MÓDULO</span>
</button>
            </div>
        </section>

    </div>
       
</body>
    <script src="js/index.js"></script>
    <script src="js/apis.js"></script>
    
</html>
