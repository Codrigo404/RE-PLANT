<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REPLANT | Corporate Protocol</title>
    <link rel="stylesheet" href="./css/cad-empresa.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-container">
        <header class="hud-header">
            <div class="header-line"></div>
            <h1 class="protocol-title">CORPORATE_ASSET_LOGIN</h1>
        </header>

        <section id="step-1" class="step-box active">
            <h2 class="section-title">REGISTRO_DE_COMPENSAÇÃO</h2>
            
            <div class="form-group">
                <label>CNPJ_DA_ORGANIZAÇÃO</label>
                <input type="text" id="cnpj" placeholder="00.000.000/0000-00" maxlength="18">
            </div>

            <div class="form-group">
                <label>RAZÃO_SOCIAL / NOME</label>
                <input type="text" id="razao-social" placeholder="AGUARDANDO_CNPJ..." readonly>
            </div>

            <div class="form-row" style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 2;">
                    <label>LOGRADOURO</label>
                    <input type="text" id="endereco" readonly>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>CIDADE/UF</label>
                    <input type="text" id="cidade-uf" readonly>
                </div>
            </div>

            <!-- NOVOS CAMPOS: RESPONSÁVEL E CONTATO -->
            <div class="form-group">
                <label>RESPONSÁVEL_PELOS_TOKENS</label>
                <input type="text" id="responsavel" placeholder="NOME DO GESTOR ESG / COMPRAS">
            </div>

            <div class="form-row" style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 1;">
                    <label>E-MAIL_CORPORATIVO</label>
                    <input type="email" id="email-corp" placeholder="exemplo@empresa.com.br">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>TELEFONE_CONTATO</label>
                    <input type="tel" id="telefone" placeholder="(00) 00000-0000" maxlength="15">
                </div>
            </div>

            <div class="form-row" style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 1;">
                    <label>RAMO_DE_ATUAÇÃO</label>
                    <select id="ramo">
                        <option value="Industria">INDÚSTRIA</option>
                        <option value="Logistica">LOGÍSTICA</option>
                        <option value="TI">TECNOLOGIA</option>
                        <option value="Varejo">VAREJO</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>MÉDIA_CARBONO (Ton/mês)</label>
                    <input type="number" id="gasto-carbono" placeholder="EX: 150">
                </div>
            </div>

            
            <button class="btn-neon" onclick="gerarProtocoloEmpresa()">ESTABELECER_PROTOCOLO</button>
            <button class="btn-neon" style="border-color: var(--cyber-blue); color: var(--cyber-blue);" onclick="window.location.href='index.html'">VOLTAR</button>
        </section>
    
        

        <!-- PASSO 2: QR CODE E PUBLICIDADE -->
        <section id="step-2" class="step-box" style="display: none; text-align: center;">
            <h2 class="section-title">QR_CODE_DE_PUBLICIDADE_ATIVO</h2>
            <div id="qrcode-container" style="background: #fff; padding: 20px; display: inline-block; margin: 20px 0; border: 4px solid var(--neon-green);">
                <img id="qr-img" src="" alt="QR Code REPLANT" style="width: 200px; height: 200px;">
            </div>
            <p class="warning-text">USE ESTE CÓDIGO EM SEUS PRODUTOS PARA COMPROVAR A NEUTRALIZAÇÃO.</p>
            <button class="btn-neon" onclick="window.print()">BAIXAR_CERTIFICADO_ID</button>
        </section>
    </div>

    <script src="./js/"></script>
</body>
</html>
